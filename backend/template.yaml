          Properties:
            Path: /tags
            Method: options
            RestApiId:
              Ref: ApiGatewayApi
            Auth:
              Authorizer: NONE
        TagsPathOptions:
          Type: Api
          Properties:
            Path: /tags/{name}
            Method: options
            RestApiId:
              Ref: ApiGatewayApi
            Auth:
              Authorizer: NONE
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
        - tags.ts
        External:
