        FundSourcesPathOptions:
          Type: Api
          Properties:
            Path: /fund-sources/{name}
            Method: options
            RestApiId:
              Ref: ApiGatewayApi
            Auth:
              Authorizer: NONE
    Metadata: # Manage esbuild properties
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints:
        - fund-sources.ts
        External:
          - '@aws-sdk/lib-dynamodb'
          - '@aws-sdk/client-dynamodb'
          - 'ft-common-layer'
